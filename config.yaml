ollama:
  base_url: "http://localhost:11434"

bedrock:
  region: "us-east-1"

# Pipeline options
translate:
  bedrock_concurrency: 2
  max_retries: 3
  ollama_timeout_s: 120
  gemini_timeout_s: 120
